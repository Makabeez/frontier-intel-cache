<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 320" width="1200" height="320" role="img" aria-label="Frontier Intel Cache banner">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#04060c"/>
      <stop offset="50%" stop-color="#0a1024"/>
      <stop offset="100%" stop-color="#04060c"/>
    </linearGradient>
    <radialGradient id="beaconGlow" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#7c5cff" stop-opacity="0.9"/>
      <stop offset="60%" stop-color="#7c5cff" stop-opacity="0.15"/>
      <stop offset="100%" stop-color="#7c5cff" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="walrusGlow" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#00c2a8" stop-opacity="0.9"/>
      <stop offset="60%" stop-color="#00c2a8" stop-opacity="0.15"/>
      <stop offset="100%" stop-color="#00c2a8" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="title" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#ffffff"/>
      <stop offset="50%" stop-color="#a8c3ff"/>
      <stop offset="100%" stop-color="#7c5cff"/>
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="1200" height="320" fill="url(#bg)"/>

  <!-- Stars (static) -->
  <g fill="#ffffff" opacity="0.8">
    <circle cx="80"   cy="40"  r="0.8"/>
    <circle cx="160"  cy="90"  r="1.0"/>
    <circle cx="240"  cy="30"  r="0.6"/>
    <circle cx="320"  cy="120" r="1.1"/>
    <circle cx="420"  cy="60"  r="0.7"/>
    <circle cx="520"  cy="200" r="1.2"/>
    <circle cx="640"  cy="50"  r="0.9"/>
    <circle cx="740"  cy="160" r="0.8"/>
    <circle cx="860"  cy="80"  r="1.0"/>
    <circle cx="960"  cy="220" r="0.7"/>
    <circle cx="1060" cy="40"  r="1.1"/>
    <circle cx="1140" cy="180" r="0.9"/>
    <circle cx="60"   cy="260" r="0.7"/>
    <circle cx="200"  cy="280" r="1.0"/>
    <circle cx="380"  cy="240" r="0.8"/>
    <circle cx="580"  cy="280" r="0.9"/>
    <circle cx="780"  cy="270" r="0.6"/>
    <circle cx="900"  cy="290" r="1.0"/>
    <circle cx="1080" cy="280" r="0.7"/>
    <circle cx="120"  cy="180" r="0.8"/>
    <circle cx="280"  cy="200" r="0.9"/>
    <circle cx="480"  cy="110" r="0.6"/>
    <circle cx="700"  cy="220" r="0.8"/>
    <circle cx="1000" cy="130" r="0.7"/>
  </g>

  <!-- Twinkling stars -->
  <g fill="#a8c3ff">
    <circle cx="180" cy="55" r="1.4">
      <animate attributeName="opacity" values="0.3;1;0.3" dur="3s" repeatCount="indefinite"/>
    </circle>
    <circle cx="450" cy="190" r="1.2">
      <animate attributeName="opacity" values="0.2;1;0.2" dur="4s" repeatCount="indefinite"/>
    </circle>
    <circle cx="820" cy="120" r="1.5">
      <animate attributeName="opacity" values="0.3;1;0.3" dur="3.5s" repeatCount="indefinite"/>
    </circle>
    <circle cx="1020" cy="80" r="1.3">
      <animate attributeName="opacity" values="0.4;1;0.4" dur="2.8s" repeatCount="indefinite"/>
    </circle>
  </g>

  <!-- Intel beacon (left, purple) — pulsing rings -->
  <g transform="translate(220, 160)">
    <circle r="80" fill="url(#beaconGlow)"/>
    <circle r="6" fill="#7c5cff"/>
    <circle r="14" fill="none" stroke="#7c5cff" stroke-width="1.5" opacity="0.8">
      <animate attributeName="r" values="14;50;14" dur="3s" repeatCount="indefinite"/>
      <animate attributeName="opacity" values="0.9;0;0.9" dur="3s" repeatCount="indefinite"/>
    </circle>
    <circle r="14" fill="none" stroke="#7c5cff" stroke-width="1.5" opacity="0.6">
      <animate attributeName="r" values="14;50;14" dur="3s" begin="1s" repeatCount="indefinite"/>
      <animate attributeName="opacity" values="0.7;0;0.7" dur="3s" begin="1s" repeatCount="indefinite"/>
    </circle>
    <circle r="14" fill="none" stroke="#7c5cff" stroke-width="1.5" opacity="0.4">
      <animate attributeName="r" values="14;50;14" dur="3s" begin="2s" repeatCount="indefinite"/>
      <animate attributeName="opacity" values="0.5;0;0.5" dur="3s" begin="2s" repeatCount="indefinite"/>
    </circle>
  </g>

  <!-- Walrus storage (right, teal) — pulsing rings -->
  <g transform="translate(980, 160)">
    <circle r="80" fill="url(#walrusGlow)"/>
    <circle r="6" fill="#00c2a8"/>
    <circle r="14" fill="none" stroke="#00c2a8" stroke-width="1.5" opacity="0.8">
      <animate attributeName="r" values="14;50;14" dur="3s" begin="0.5s" repeatCount="indefinite"/>
      <animate attributeName="opacity" values="0.9;0;0.9" dur="3s" begin="0.5s" repeatCount="indefinite"/>
    </circle>
    <circle r="14" fill="none" stroke="#00c2a8" stroke-width="1.5" opacity="0.6">
      <animate attributeName="r" values="14;50;14" dur="3s" begin="1.5s" repeatCount="indefinite"/>
      <animate attributeName="opacity" values="0.7;0;0.7" dur="3s" begin="1.5s" repeatCount="indefinite"/>
    </circle>
  </g>

  <!-- Data link line between beacon and storage -->
  <line x1="240" y1="160" x2="960" y2="160" stroke="#7c5cff" stroke-width="0.8" stroke-dasharray="4 6" opacity="0.4"/>
  <line x1="240" y1="160" x2="960" y2="160" stroke="#00c2a8" stroke-width="0.8" stroke-dasharray="2 8" opacity="0.4">
    <animate attributeName="stroke-dashoffset" values="0;-100" dur="4s" repeatCount="indefinite"/>
  </line>

  <!-- Title -->
  <text x="600" y="155" text-anchor="middle" font-family="ui-monospace, SFMono-Regular, Menlo, Consolas, monospace" font-weight="700" font-size="44" fill="url(#title)" letter-spacing="2">
    FRONTIER INTEL CACHE
  </text>

  <!-- Subtitle -->
  <text x="600" y="195" text-anchor="middle" font-family="ui-sans-serif, system-ui, sans-serif" font-weight="400" font-size="16" fill="#8aa0c4" letter-spacing="3">
    ON-CHAIN PROOF · OFF-CHAIN PAYLOAD
  </text>

  <!-- Bottom hint -->
  <text x="600" y="265" text-anchor="middle" font-family="ui-monospace, SFMono-Regular, Menlo, Consolas, monospace" font-weight="400" font-size="11" fill="#5a6a8a" letter-spacing="1">
    SUI MOVE × WALRUS × TATUM RPC
  </text>
</svg>
